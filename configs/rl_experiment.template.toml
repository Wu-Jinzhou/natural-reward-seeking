[experiment]
name = "situational_awareness_rl"
policy_model_id = "allenai/Olmo-3-7B-Think-SFT"
reward_model_id = "Skywork/Skywork-Reward-V2-Llama-3.1-8B-40M"
algorithm = "dapo"
framework = "verl"

[dataset]
root = "wildjailbreak"
train_size = 1500
eval_size = 230

[training]
num_generations = 8
max_completion_length = 512
learning_rate = 5e-7
num_train_epochs = 1
per_device_train_batch_size = 4
gradient_accumulation_steps = 1
temperature = 1.0
eval_interval_steps = 50

